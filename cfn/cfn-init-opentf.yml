AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation template to create an IAM role for deployments, an S3 bucket for state storage, and the required IAM policies.

Parameters:
  OpenTofuStateBucketName:
    Type: String
    Description: The name for the S3 bucket to store OpenTofu state and lock files

Resources:
  OpenTofuStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref OpenTofuStateBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  StateBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OpenTofuStateBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - s3:Get*
              - s3:Put*
              - s3:List*
              - s3:DeleteObject
            Resource:
              - !Sub "${OpenTofuStateBucket.Arn}"
              - !Sub "${OpenTofuStateBucket.Arn}/*"
