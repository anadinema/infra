# List all the repositories to be created from OpenTofu

owner: anadinema

repositories:
  - name: anadinema
    description: 'Config files for my GitHub profile'
    autoMergePr: true
    secrets:
      - name: README_TOKEN
        onePassItem: github-readme-stats
      - name: GH_TOKEN
        onePassItem: github-token-ci-cd
    tags:
      - github
      - config
  - name: infra
    description: 'Common infrastructure, workflows, action, etc., eg. repositories, cloudflare settings, actions for other repos'
    secrets:
      - name: ONE_PASSWORD_SA_TOKEN
        onePassItem: onepass-infra-sa
      - name: GH_ACCESS_TOKEN
        onePassItem: github-token-ci-cd
    tags:
      - terraform
      - cloudformation
    environments:
      - name: production
