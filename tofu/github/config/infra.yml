# List all the repositories to be created from OpenTofu

owner: anadinema
owner_name: 'Anadi Nema'
current_year: 2026

global_template_dirs:
  - templates/global

anchors:
  - &mit_license templates/license/mit
  - &unlicense templates/license/unlicense
  - &gpl_license templates/license/gpl3
  - &apache_license templates/license/apache2

repositories:
  - name: anadinema
    description: 'Config files for my GitHub profile'
    inception_year: 2020
    enable_auto_merge: true
    tags:
      - github
      - config
    template_dirs:
      - *mit_license
    secrets:
      - name: README_TOKEN
        op_item: github-readme-stats
      - name: GH_ACCESS_TOKEN
        op_item: github-token-ci-cd

  - name: infra
    description: 'Common infrastructure, workflows, action, etc., eg. repositories, cloudflare settings, actions for other repos'
    inception_year: 2025
    tags:
      - terraform
      - cloudformation
    secrets:
      - name: ONE_PASSWORD_SA_TOKEN
        op_item: onepass-infra-sa
      - name: GH_ACCESS_TOKEN
        op_item: github-token-ci-cd
      - name: AWS_IAM_ROLE_NAME
        op_item: github-aws-iam-role
    template_dirs:
      - *mit_license
    environments:
      - name: sandbox
        secrets:
          - name: AWS_ACCOUNT_ID
            op_item: github-sandbox-aws-account-id
      - name: production
        secrets:
          - name: AWS_ACCOUNT_ID
            op_item: github-production-aws-account-id
      - name: management
        secrets:
          - name: AWS_ACCOUNT_ID
            op_item: github-management-aws-account-id

  - name: actions
    description: 'Common workflows, composite actions and javascript actions for use in other repos/projects'
    inception_year: 2026
    pages: true
    homepage: 'https://actions.anadinema.dev'
    tags:
      - github
      - github-actions
      - workflows
      - composite-actions
      - shared-workflows
    template_dirs:
      - *mit_license

  - name: dotfiles
    description: '🔧 .files, including ~/scripts/defaults.zsh - sensible developer defaults for macOS'
    inception_year: 2024
    homepage: 'https://github.com/anadinema/dotfiles'
    tags:
      - macos
